<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Stephen Port in WDD 230: Web Frontend Development at Brigham Young University - Idaho">
    <title>W07 Prepare Activity: Progressive Loading of Images</title>
    <link rel="stylesheet" href="styles/base.css">
</head>
<body>
    <div id="content">
        <main>
            <h1>Progressive Loading of Images</h1>
            <picture>
                <img src="https://picsum.photos/300/400?random=1" alt="random-image">
            </picture>
            <picture>
                <img src="https://picsum.photos/300/400?random=2" alt="random-image">
            </picture>
            <picture>
                <img src="images/placeholder.jpg" data-src="https://picsum.photos/300/400?random=3" alt="random-image">
            </picture>
            <picture>
                <img src="images/placeholder.jpg" data-src="https://picsum.photos/300/400?random=4" alt="random-image">
            </picture>
            <picture>
                <img src="images/placeholder.jpg" data-src="https://picsum.photos/300/400?random=5" alt="random-image">
            </picture>
            <picture>
                <img src="images/placeholder.jpg" data-src="https://picsum.photos/300/400?random=6" alt="random-image">
            </picture>
        </main>
    </div>
    <script src="scripts/lazyload.js"></script>
</body>
</html>
