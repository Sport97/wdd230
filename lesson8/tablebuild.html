<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>W08 Activity: Table Build</title>
    <link rel="stylesheet" href="styles/base.css">
</head>
<body>
    <div id="content">
        <main>
            <h1>Table Build</h1>
            <table>
                <caption>Table 1: Account Feature Comparison</caption>
                <thead>
                    <tr>
                        <th colspan="4" scope="colgroup">Acme Wildwest Services</th>
                    </tr>
                    <tr>
                        <th scope="col"></th>
                        <th scope="col">Basic</th>
                        <th scope="col">Premium</th>
                        <th scope="col">Deluxe</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Feature 1</td>
                        <td>✔</td>
                        <td>✔</td>
                        <td>✔</td>
                    </tr>
                    <tr>
                        <td>Feature 2</td>
                        <td>❌</td>
                        <td>✔</td>
                        <td>✔</td>
                    </tr>
                    <tr>
                        <td>Feature 3</td>
                        <td>❌</td>
                        <td>❌</td>
                        <td>✔</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>
    <script src="scripts/tablebuild.js"></script>
</body>
</html>
